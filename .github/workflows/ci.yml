name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Python проверки (только если есть Python проект)
  test-python:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./python
    if: ${{ hashFiles('python/pyproject.toml') != '' }}

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Type check with mypy
        run: mypy .

      - name: Test with pytest
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}

  # C# проверки (только если есть C# проект)
  test-csharp:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./csharp
    if: ${{ hashFiles('csharp/*.csproj') != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: unittests
          name: codecov-csharp
          token: ${{ secrets.CODECOV_TOKEN }}

  # Android проверка (только если есть Android проект)
  test-android:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('Android/MeasuringAssistant/settings.gradle') != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x ./Android/MeasuringAssistant/gradlew
        working-directory: Android/MeasuringAssistant

      - name: Lint with ktlint
        continue-on-error: true
        run: ./gradlew lintDebug
        working-directory: Android/MeasuringAssistant

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: Android/MeasuringAssistant

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Android/MeasuringAssistant/app/build/outputs/apk/debug/*.apk

  # Сборка Python приложения (только если есть GUI)
  build-python:
    needs: test-python
    runs-on: windows-latest
    if: ${{ always() && hashFiles('python/src/gui/main.py') != '' && needs.test-python.result == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed src/gui/main.py --name MyApp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-Windows
          path: dist/

  # Сборка C# приложения (только если есть проект)
  build-csharp:
    needs: test-csharp
    runs-on: windows-latest
    if: ${{ always() && hashFiles('csharp/*.csproj') != '' && needs.test-csharp.result == 'success' }}
    defaults:
      run:
        working-directory: ./csharp

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-Windows-CS
          path: publish/
