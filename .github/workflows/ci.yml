name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Базовые проверки кода
  lint:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

  # Проверка конфигов
  validate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML
        run: |
          python -m pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml'))"

      - name: Check for large files
        run: |
          # Проверка файлов > 50 MB
          for file in $(git ls-files); do
            if [ -f "$file" ]; then
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$size" -gt 52428800 ]; then
                echo "Error: $file is larger than 50 MB ($size bytes)"
                exit 1
              fi
            fi
          done

  # C# проверка (если есть C# проекты)
  test-csharp:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./csharp
    if: hashFiles('csharp/*.csproj') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  # Python проверка (если есть Python проекты)
  test-python:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./python
    if: hashFiles('python/pyproject.toml') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Type check with mypy
        run: mypy .

      - name: Test with pytest
        run: pytest tests/ -v
