name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Python проверки (только если есть Python проект)
  test-python:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./python

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Check if Python project exists
        id: check
        run: echo "exists=${{ hashFiles('python/pyproject.toml') != '' }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Python ${{ matrix.python-version }}
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        if: steps.check.outputs.exists == 'true'
        run: ruff check .

      - name: Check formatting with black
        if: steps.check.outputs.exists == 'true'
        run: black --check .

      - name: Type check with mypy
        if: steps.check.outputs.exists == 'true'
        run: mypy .

      - name: Test with pytest
        if: steps.check.outputs.exists == 'true'
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: always() && steps.check.outputs.exists == 'true'
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}

  # C# проверки (только если есть C# проект)
  test-csharp:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./csharp

    steps:
      - uses: actions/checkout@v4

      - name: Check if C# project exists
        id: check
        run: echo "exists=${{ hashFiles('csharp/*.csproj') != '' }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup .NET
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        if: steps.check.outputs.exists == 'true'
        run: dotnet restore

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: dotnet build --no-restore

      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage to Codecov
        if: always() && steps.check.outputs.exists == 'true'
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          flags: unittests
          name: codecov-csharp
          token: ${{ secrets.CODECOV_TOKEN }}

  # Android проверка (только если есть Android проект)
  test-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if Android project exists
        id: check
        run: echo "exists=${{ hashFiles('Android/MeasuringAssistant/settings.gradle') != '' }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up JDK 17
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.check.outputs.exists == 'true'
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        if: steps.check.outputs.exists == 'true'
        run: chmod +x ./Android/MeasuringAssistant/gradlew

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        continue-on-error: true
        run: ./gradlew lintDebug
        working-directory: Android/MeasuringAssistant

      - name: Build APK
        if: steps.check.outputs.exists == 'true'
        run: ./gradlew assembleDebug
        working-directory: Android/MeasuringAssistant

      - name: Upload APK
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Android/MeasuringAssistant/app/build/outputs/apk/debug/*.apk

  # Сборка Python приложения (только если есть GUI)
  build-python:
    needs: test-python
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if GUI exists
        id: check
        run: echo "exists=${{ hashFiles('python/src/gui/main.py') != '' }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        if: steps.check.outputs.exists == 'true'
        run: |
          pyinstaller --onefile --windowed src/gui/main.py --name MyApp

      - name: Upload artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-Windows
          path: dist/

  # Сборка C# приложения (только если есть проект)
  build-csharp:
    needs: test-csharp
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./csharp

    steps:
      - uses: actions/checkout@v4

      - name: Check if C# project exists
        id: check
        run: echo "exists=${{ hashFiles('csharp/*.csproj') != '' }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup .NET
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        if: steps.check.outputs.exists == 'true'
        run: dotnet publish -c Release -o publish

      - name: Upload artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-Windows-CS
          path: publish/
